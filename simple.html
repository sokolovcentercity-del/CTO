<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Экспертная AI-проверка — перенаправление</title>
<style>
  body { margin: 0; background: rgb(2,6,23); color: #e2e8f0;
    font-family: Inter, system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; }
  .msg { font-size: 0.85rem; color: #64748b; }
  a { color: #22d3ee; }
</style>
</head>
<body>
<div>
  <div style="font-size:2rem;margin-bottom:0.75rem">🔬</div>
  <div class="msg">Перенаправление на экспертную проверку…<br>
    <a id="link" href="../#simple-check">Нажмите здесь если не перешли автоматически</a>
  </div>
</div>
<script>
  // Redirect to index.html#simple-check (works both in preview and published)
  var base = window.location.href.replace(/\/doc-checker\/simple\.html.*$/, '/');
  var target = base + '#simple-check';
  document.getElementById('link').href = target;
  window.location.replace(target);
</script>
</body>
</html>
